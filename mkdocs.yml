site_name: behaviz
site_description: A modular, multi-backend scientific plotting library
site_url: https://behaviz.readthedocs.io/
repo_url: https://github.com/kaancet/behaviz
repo_name: kaancet/behaviz

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true
            # Source docstrings have some param/signature drift (pre-existing debt);
            # don't fail the build over autodoc griffe warnings.
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Getting started:
      - Installation: install.md
      - Quickstart: quickstart.md
      - Core concepts: concepts.md
  - Plotting:
      - Overview: plots/index.md
      - Basic plots: plots/basic.md
      - Distributions: plots/distribution.md
      - 2D & images: plots/twod.md
      - Annotations: plots/annotation.md
      - Data input: data.md
      - Grouping (group & hue): grouping.md
  - Styling:
      - The spec system: specs/index.md
      - AxisSpec: specs/axis.md
      - FigureSpec: specs/figure.md
      - ColorbarSpec: specs/colorbar.md
      - Overriding: overriding.md
      - Presets: presets.md
  - Output:
      - Saving & display: saving.md
      - Hover tooltips: hover.md
  - Advanced:
      - Manipulators: manipulations.md
      - Composite plots: composite.md
      - Architecture: architecture.md
  - API reference:
      - Plot functions: reference/core.md
      - Specs: reference/spec.md
      - Manipulations: reference/manipulations.md
      - I/O & presets: reference/io.md
