# Read the Docs build config. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Let RTD install into the build virtualenv it runs `python -m mkdocs` from.
# (A custom `uv pip install --system` installs into the system Python instead,
# so the venv can't find mkdocs → "No module named mkdocs".)
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

mkdocs:
  configuration: mkdocs.yml
